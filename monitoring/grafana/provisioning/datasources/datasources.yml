apiVersion: 1

deleteDatasources:
  - name: Prometheus
  - name: Loki
  - name: Tempo

datasources:

  - name: Prometheus

    uid: prometheus

    type: prometheus

    access: proxy

    url: http://prometheus:9090

    isDefault: true

    editable: false

  - name: Loki

    uid: loki

    type: loki

    access: proxy

    url: http://loki:3100

    editable: false

  - name: Tempo

    uid: tempo

    type: tempo

    access: proxy

    url: http://tempo:3200

    editable: false

    jsonData:
      httpMethod: GET

      serviceMap:
        datasourceUid: prometheus

      tracesToLogs:
        datasourceUid: loki

      tracesToMetrics:
        datasourceUid: prometheus