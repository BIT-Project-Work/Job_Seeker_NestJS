server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

        http:
          endpoint: 0.0.0.0:4318

ingester:

compactor:

metrics_generator:
  registry:
    external_labels:
      source: tempo

storage:
  trace:
    backend: local

    local:
      path: /tmp/tempo/traces

wal:
  path: /tmp/tempo/wal